<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RCB vs DC — CricIntelligence.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060b1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Canvas ── */
    .canvas {
      width: 1080px;
      height: 1080px;
      background-color: #0F1535;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 56px 64px 48px;
    }

    /* Background pattern — diagonal hairlines */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 1px,
          transparent 1px,
          transparent 48px
        );
      pointer-events: none;
    }

    /* Radial glow behind match-up */
    .canvas::after {
      content: '';
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 760px;
      height: 520px;
      background: radial-gradient(ellipse at center,
        rgba(99,32,144,0.18) 0%,
        rgba(15,21,53,0) 70%
      );
      pointer-events: none;
    }

    /* ── Top section ── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .ipl-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #92400E 0%, #F59E0B 50%, #92400E 100%);
      color: #000;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 9px 26px;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(245,158,11,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .ipl-badge .star { font-size: 13px; }

    .match-meta {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: #94A3B8;
      text-transform: uppercase;
    }

    .match-meta .highlight {
      color: #F59E0B;
      font-weight: 700;
    }

    /* ── Match-up ── */
    .matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .team-abbr {
      font-size: 148px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      text-shadow: 0 0 60px currentColor;
    }

    .team--rcb .team-abbr { color: #EF4444; }
    .team--dc  .team-abbr { color: #60A5FA; }

    .team-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .team--rcb .team-name { color: rgba(239,68,68,0.75); }
    .team--dc  .team-name { color: rgba(96,165,250,0.75); }

    .team-icon {
      font-size: 44px;
      line-height: 1;
    }

    /* VS divider */
    .vs-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 0 0 140px;
    }

    .vs-line {
      width: 1px;
      height: 110px;
      background: linear-gradient(to bottom, transparent, rgba(148,163,184,0.25), transparent);
    }

    .vs-text {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #E2E8F0;
      text-shadow: 0 2px 18px rgba(226,232,240,0.25);
    }

    /* ── Divider rule ── */
    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(148,163,184,0.18), transparent);
      position: relative;
      z-index: 1;
    }

    /* ── Venue ── */
    .venue {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 500;
      color: #94A3B8;
      letter-spacing: 0.04em;
      position: relative;
      z-index: 1;
    }

    .venue .pin { font-size: 22px; }

    /* ── AI Pill ── */
    .ai-pill-wrap {
      position: relative;
      z-index: 1;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.08));
      border: 1.5px solid rgba(245,158,11,0.45);
      border-radius: 100px;
      padding: 14px 36px;
      box-shadow: 0 0 32px rgba(245,158,11,0.15);
    }

    .ai-pill .robot { font-size: 26px; }

    .ai-pill-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #F59E0B;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #F59E0B;
      box-shadow: 0 0 10px #F59E0B;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Trust chips ── */
    .chips {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #CBD5E1;
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .chip-dot--green  { background: #22C55E; box-shadow: 0 0 8px #22C55E; }
    .chip-dot--amber  { background: #F59E0B; box-shadow: 0 0 8px #F59E0B; }
    .chip-dot--blue   { background: #60A5FA; box-shadow: 0 0 8px #60A5FA; }

    .chip-sep {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.08);
    }

    /* ── Bottom strip ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .bottom-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(245,158,11,0.3), transparent);
      margin-bottom: 6px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #FFFFFF;
    }

    .brand-logo span { color: #F59E0B; }

    .brand-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.2);
    }

    .brand-tagline {
      font-size: 15px;
      font-weight: 400;
      color: #64748B;
      letter-spacing: 0.04em;
    }

    /* ── Corner watermark ── */
    .corner-mark {
      position: absolute;
      bottom: 20px;
      right: 28px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(100,116,139,0.4);
      z-index: 1;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Top: Badge + Meta -->
    <div class="top">
      <div class="ipl-badge">
        <span class="star">★</span>
        IPL 2026
        <span class="star">★</span>
      </div>
      <div class="match-meta">
        Match 26 &nbsp;·&nbsp; <span class="highlight">Today</span> &nbsp;·&nbsp; 7:30 PM IST
      </div>
    </div>

    <!-- Match-up -->
    <div class="matchup">
      <div class="team team--rcb">
        <div class="team-icon">🔥</div>
        <div class="team-abbr">RCB</div>
        <div class="team-name">Royal Challengers Bengaluru</div>
      </div>

      <div class="vs-col">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
      </div>

      <div class="team team--dc">
        <div class="team-icon">⚡</div>
        <div class="team-abbr">DC</div>
        <div class="team-name">Delhi Capitals</div>
      </div>
    </div>

    <!-- Venue -->
    <div class="venue">
      <span class="pin">📍</span>
      M. Chinnaswamy Stadium, Bengaluru
    </div>

    <div class="rule"></div>

    <!-- AI Pill -->
    <div class="ai-pill-wrap">
      <div class="ai-pill">
        <span class="robot">🤖</span>
        <span class="ai-pill-text">AI Prediction goes live at kickoff</span>
        <span class="ai-dot"></span>
      </div>
    </div>

    <!-- Trust chips -->
    <div class="chips">
      <div class="chip">
        <span class="chip-dot chip-dot--green"></span>
        ML Model
      </div>
      <div class="chip-sep"></div>
      <div class="chip">
        <span class="chip-dot chip-dot--amber"></span>
        Live Odds
      </div>
      <div class="chip-sep"></div>
      <div class="chip">
        <span class="chip-dot chip-dot--blue"></span>
        Bet Signal
      </div>
    </div>

    <!-- Bottom branding -->
    <div class="bottom">
      <div class="bottom-rule"></div>
      <div class="brand-row">
        <div class="brand-logo">Cric<span>Intelligence</span>.com</div>
        <div class="brand-sep"></div>
        <div class="brand-tagline">Smarter cricket bets — powered by AI</div>
      </div>
    </div>

    <div class="corner-mark">crickintelligence.com</div>

  </div>
</body>
</html>
